services:
  pg-primary:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  pg-replica-1:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"

  pg-replica-2:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"

  pgpool:
    image: pgpool/pgpool:latest
    ports:
      - "9999:5432"
    environment:
      PGPOOL_PARAMS_BACKEND_HOSTNAME0: pg-primary
      PGPOOL_PARAMS_BACKEND_PORT0: "5432"
      PGPOOL_PARAMS_BACKEND_WEIGHT0: "1"

      PGPOOL_PARAMS_BACKEND_HOSTNAME1: pg-replica-1
      PGPOOL_PARAMS_BACKEND_PORT1: "5432"
      PGPOOL_PARAMS_BACKEND_WEIGHT1: "1"

      PGPOOL_PARAMS_BACKEND_HOSTNAME2: pg-replica-2
      PGPOOL_PARAMS_BACKEND_PORT2: "5432"
      PGPOOL_PARAMS_BACKEND_WEIGHT2: "1"

      PGPOOL_POSTGRES_USERNAME: postgres
      PGPOOL_POSTGRES_PASSWORD: postgres


